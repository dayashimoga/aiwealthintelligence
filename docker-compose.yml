services:
  # ========================
  # API Service
  # ========================
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: wealthai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://wealthai:wealthai_secret@db:5432/wealthai
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========================
  # PostgreSQL
  # ========================
  db:
    image: pgvector/pgvector:pg16
    container_name: wealthai-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wealthai
      POSTGRES_USER: wealthai
      POSTGRES_PASSWORD: wealthai_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7-alpine
    container_name: wealthai-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Flutter Builder (for local builds without Flutter SDK)
  # ========================
  flutter:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.flutter
    container_name: wealthai-flutter
    volumes:
      - ./apps/web:/app
      - flutter-pub-cache:/opt/flutter/.pub-cache
    working_dir: /app
    profiles:
      - build
    entrypoint: ["flutter"]

  # ========================
  # Prometheus
  # ========================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: wealthai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    profiles:
      - observability

  # ========================
  # Grafana
  # ========================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: wealthai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

volumes:
  postgres-data:
  redis-data:
  api-data:
  flutter-pub-cache:
  prometheus-data:
  grafana-data:
