services:
  # ========================
  # API Service
  # ========================
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: wealthai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://wealthai:wealthai_secret@db:5432/wealthai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================
  # PostgreSQL
  # ========================
  db:
    image: pgvector/pgvector:pg16
    container_name: wealthai-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wealthai
      POSTGRES_USER: wealthai
      POSTGRES_PASSWORD: wealthai_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7-alpine
    container_name: wealthai-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Prometheus
  # ========================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: wealthai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    profiles:
      - observability

  # ========================
  # Grafana
  # ========================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: wealthai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

volumes:
  postgres-data:
  redis-data:
  api-data:
  prometheus-data:
  grafana-data:
