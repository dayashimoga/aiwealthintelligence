name: wealthai
description: AI Wealth Intelligence Platform - Your AI Financial Copilot
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # HTTP & Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  connectivity_plus: ^6.1.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  file_picker: ^6.1.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  url_launcher: ^6.3.1
  local_auth: ^2.3.0

  # Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  mockito: ^5.4.4
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/


