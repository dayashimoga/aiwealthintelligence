name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  # ===================================
  # Deploy Flutter Web to Cloudflare Pages
  # ===================================
  deploy-web:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Deploy on push to main branch only
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web (Production)
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://wealthai-api.onrender.com' }} \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=https://www.gstatic.com/flutter-canvaskit/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # working-directory is apps/web so build/web is relative to that
          command: pages deploy build/web --project-name=wealthai --branch=${{ github.head_ref || github.ref_name }}

  # ===================================
  # Build Android
  # ===================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Set up Android keystore from CI secrets (if configured)
      - name: Set up signing keystore
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/wealthai-release.jks
          echo "KEYSTORE_PATH=$(pwd)/android/app/wealthai-release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASS=${{ secrets.KEY_PASS }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://wealthai-api.onrender.com' }}

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://wealthai-api.onrender.com' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # working-directory is apps/web so path is relative from repo root
          path: apps/web/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: apps/web/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

  # ===================================
  # Build iOS (requires macOS runner)
  # ===================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/web/build/ios/iphoneos

  # ===================================
  # Create Release
  # ===================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-artifacts

      - name: Generate Changelog
        id: changelog
        run: |
          echo "## Changes" > CHANGELOG_RELEASE.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD >> CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v0.1.${{ github.run_number }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            release-artifacts/*.apk
          draft: false
          prerelease: false
