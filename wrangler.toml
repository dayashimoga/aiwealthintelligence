# Cloudflare Pages configuration for WealthAI Flutter Web deployment.
#
# Usage:
#   wrangler pages deploy apps/web/build/web --project-name=wealthai
#
# Environment variables are set in the Cloudflare Pages dashboard under:
#   Settings > Environment variables
#
# CI/CD: see .github/workflows/deploy.yml (deploy-web job uses wrangler-action@v3)

name = "wealthai"
compatibility_date = "2024-01-01"
pages_build_output_dir = "apps/web/build/web"

